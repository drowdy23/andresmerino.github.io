<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrés Merino — Visual Development</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #050505;
            --text: #e5e5e5;
            --muted: #555555;
            --dim: #222222;
            --border: rgba(255,255,255,0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Lock scroll for the index, it's a single screen experience */
        }

        /* ── GLOBAL NAV ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 3rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .nav-logo, .nav-links a {
            pointer-events: all;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.4s ease;
        }

        .nav-logo { color: #fff; font-weight: 500; }
        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { transition: color 0.4s ease; }
        .nav-links a:hover { color: #fff; }

        /* ── LAYOUT ── */
        .index-container {
            display: grid;
            grid-template-columns: 4fr 8fr; /* Asymmetric split */
            height: 100vh;
            width: 100vw;
        }

        /* Left Side: Typography & Menu */
        .index-left {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 4rem;
            padding-bottom: 6rem;
            border-right: 1px solid var(--border);
            position: relative;
            z-index: 2;
            background: var(--bg);
        }

        .artist-title {
            font-family: 'EB Garamond', serif;
            font-size: clamp(3rem, 5vw, 5rem);
            font-weight: 400;
            line-height: 0.9;
            letter-spacing: -0.02em;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        .artist-subtitle {
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none !important;
            color: #fff !important;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.9rem 1.6rem;
            border-radius: 4px;
            margin-bottom: 4rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            align-self: flex-start;
        }

        .contact-btn:hover {
            background: #fff;
            color: #000 !important;
            border-color: #fff;
            transform: translateX(5px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .contact-btn svg {
            transition: transform 0.4s ease;
            stroke: currentColor;
        }

        .contact-btn:hover svg {
            transform: translateX(4px);
        }

        /* ── PROJECTS MENU ── */
        .menu-header {
            font-family: 'Space Mono', monospace;
            font-size: 0.45rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .project-link {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: var(--muted);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s ease;
            transform-origin: left center;
        }

        .project-link:hover {
            color: #fff;
            transform: translateX(10px);
        }

        .project-link .num {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 0.3rem;
            transition: color 0.4s ease;
        }

        .project-link:hover .num { color: #fff; }

        .project-link .name {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .project-link .tags {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #666;
            transition: color 0.4s ease;
        }

        .project-link:hover .tags { color: #aaa; }

        /* The NDA Link */
        .nda-link {
            margin-top: 1rem;
            padding-top: 2.5rem;
            border-top: 1px solid var(--border);
        }
        .index-right {
            position: relative;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .index-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%; /* Keep focus on the characters */
            opacity: 0;
            animation: heroReveal 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .index-right:hover img {
            transform: scale(1.02);
        }

        @keyframes heroReveal {
            from { transform: scale(1.05); opacity: 0; }
            to   { transform: scale(1);   opacity: 0.9; }
        }

        /* Subtle overlay to blend the image into the background slightly */
        .index-right::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, var(--bg) 0%, transparent 15%);
            pointer-events: none;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1024px) {
            body { overflow: auto; }
            .index-container {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
                display: flex;
                flex-direction: column-reverse;
            }
            .index-left {
                border-right: none;
                padding-top: 4rem;
            }
            .index-right {
                height: 60vh;
                width: 100%;
                border-bottom: 1px solid var(--border);
            }
            .index-right::after {
                background: linear-gradient(to bottom, transparent 60%, var(--bg) 100%);
            }
            .nav-links { display: none; } /* Hide on extreme mobile or move to footer */
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">AM</div>
    <div class="nav-links">
        <a href="nda-login.html">NDA Access</a>
        <a href="mailto:andresgonzalezmerino@gmail.com" class="contact-btn">
            Get in Touch 
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
    </div>
</nav>

<div class="index-container">
    
    <!-- Left: Typography & Navigation -->
    <div class="index-left">
        <div>
            <h1 class="artist-title">Andrés<br>Merino</h1>
            <div class="artist-subtitle">Visual Development &middot; Environment Design</div>
            <a href="mailto:andresgonzalezmerino@gmail.com" class="contact-btn">
                Get in Touch
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-1px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </div>

        <div class="menu-header">Selected Projects</div>

        <div class="project-list">
            <a href="project-personal.html" class="project-link">
                <span class="num">01.</span>
                <span class="name">Personal Work</span>
                <span class="tags">Visdev &middot; Concept Art</span>
            </a>
            <a href="project-kayara.html" class="project-link">
                <span class="num">02.</span>
                <span class="name">Kayara</span>
                <span class="tags">Color Script</span>
            </a>
            <a href="project-tales.html" class="project-link">
                <span class="num">03.</span>
                <span class="name">Tales From Outer Suburbia</span>
                <span class="tags">Visdev &middot; Background Work</span>
            </a>
            <a href="nda-login.html" class="project-link nda-link">
                <span class="num" style="color: #666;">[ Private ]</span>
                <span class="name" style="color: #fff; display: flex; align-items: center; gap: 0.75rem;">
                    Password Protected Work 
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <span class="tags" style="color: #555;">Unannounced Productions</span>
            </a>
        </div>
    </div>

    <!-- Right: The Masterpiece -->
    <div class="index-right">
        <img src="assets/img/hero-index.webp" alt="Andrés Merino Visual Development">
    </div>

</div>

</body>
</html>
