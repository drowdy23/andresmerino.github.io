<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayara — Andrés Merino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #030303; --surface: #0a0a0a; --border: rgba(255,255,255,0.06); --text: #e0e0e0; --muted: #666; --accent: #999; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        nav { padding: 2rem 4rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; background: rgba(3,3,3,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        .nav-back, .nav-logo { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
        .nav-back:hover { color: #fff; }
        .nav-logo { font-weight: 700; color: #fff; }
        .hero { width: 100%; height: 80vh; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); cursor: pointer; }
        .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .hero-title-wrap { position: absolute; bottom: 4rem; left: 4rem; z-index: 2; }
        .hero-title { font-family: 'EB Garamond', serif; font-size: 5rem; font-weight: 400; color: #fff; margin-bottom: 0.5rem; }
        .hero-subtitle { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); }
        .section-intro { padding: 6rem 4rem 2rem; max-width: 1400px; margin: 0 auto; }
        .section-intro h2 { font-family: 'EB Garamond', serif; font-size: 2.5rem; font-weight: 400; color: #fff; }
        .color-script-container { padding: 2rem 4rem 10rem; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 6rem; }
        .sequence { display: flex; flex-direction: column; gap: 2rem; }
        .seq-header { font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; color: #444; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        [data-lb] { cursor: pointer; background: #000; display: block; overflow: hidden; border: 1px solid var(--border); }
        [data-lb] img { width: 100%; display: block; transition: transform 0.8s ease; }
        [data-lb]:hover img { transform: scale(1.02); }
        .grid-split-stack { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .stack-vertical { display: flex; flex-direction: column; gap: 2rem; }
        .grid-split-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .color-palette-bar { display: flex; height: 4px; margin-top: 1rem; width: 100%; }
        .color-palette-bar div { flex: 1; }
        .project-nav { padding: 4rem; display: flex; justify-content: space-between; border-top: 1px solid var(--border); }
        .project-nav a { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
        footer { padding: 2rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.45rem; letter-spacing: 0.2em; text-transform: uppercase; color: #333; }
        .side-contact { position: fixed; right: 2rem; bottom: 2rem; z-index: 9999; }
        .side-btn { background: #fff; color: #000; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
        .lightbox { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; visibility: hidden; }
        .lightbox.active { visibility: visible; }
        .lb-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.95); }
        .lb-img-wrap img { max-width: 90vw; max-height: 80vh; position: relative; z-index: 2; }
    </style>
</head>
<body>
<nav><a href="index.html" class="nav-back">&#8592; Back</a><div class="nav-logo">AM</div></nav>
<div class="hero" data-lb><img src="assets/img/projects/Kayara/Screenshot 2026-04-03 185934.webp" alt="Hero"><div class="hero-title-wrap"><h1 class="hero-title">Kayara</h1><div class="hero-subtitle">Visual Development &middot; Color Script</div></div></div>
<div class="section-intro"><h2>Color Keys</h2></div>
<div class="color-script-container">
    <div class="sequence"><div class="seq-header"><span>Seq 01</span></div><div class="grid-split-stack"><div><div data-lb><img src="assets/img/projects/Kayara/Untitled-1.webp" alt="Kayara"></div></div><div class="stack-vertical"><div><div data-lb><img src="assets/img/projects/Kayara/imagen_2025-05-28_202015038.webp" alt="Kayara"></div></div><div><div data-lb><img src="assets/img/projects/Kayara/imagen_2025-05-28_201935981.webp" alt="Kayara"></div></div></div></div></div>
    <div class="sequence"><div class="seq-header"><span>Seq 02</span></div><div class="grid-split-equal"><div><div data-lb><img src="assets/img/projects/Kayara/imagen_2025-05-28_202423629.webp" alt="Kayara"></div></div><div><div data-lb><img src="assets/img/projects/Kayara/imagen_2025-05-28_201420167.webp" alt="Kayara"></div></div></div></div>
    <div class="sequence"><div class="seq-header"><span>Seq 03</span></div><div class="grid-split-equal"><div><div data-lb><img src="assets/img/projects/Kayara/imagen_2025-05-28_202511785.webp" alt="Kayara"></div></div><div><div data-lb><img src="assets/img/projects/Kayara/imagen_2025-05-28_203336589.webp" alt="Kayara"></div></div></div></div>
</div>
<div class="project-nav"><a href="project-personal.html">&#8592; Previous</a><a href="project-tales.html">Next &#8594;</a></div>
<footer><span>&copy; 2026 Andrés Merino</span></footer>
<div class="lightbox" id="lightbox"><div class="lb-backdrop" id="lb-backdrop"></div><div class="lb-img-wrap"><img id="lb-img" src=""></div></div>
<script>
    const lb = document.getElementById('lightbox'); const lbImg = document.getElementById('lb-img');
    document.querySelectorAll('[data-lb]').forEach(el => el.onclick = () => { lbImg.src = el.querySelector('img').src; lb.classList.add('active'); });
    document.getElementById('lb-backdrop').onclick = () => lb.classList.remove('active');
</script>
</body>
</html>
