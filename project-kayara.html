<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayara — Andrés Merino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --border: rgba(255,255,255,0.06);
            --text: #e0e0e0;
            --muted: #555555;
            --accent: #999999;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            padding: 1.75rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 500;
            background: rgba(3,3,3,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .nav-back, .nav-logo {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-back:hover, .nav-logo:hover { color: #fff; }

        /* ── HERO ── */
        .hero {
            width: 100%;
            height: 90vh;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .hero img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero:hover img { transform: scale(1.02); }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(3,3,3,0.95) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-title-wrap {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            z-index: 2;
            pointer-events: none;
        }

        .hero-title {
            font-family: 'EB Garamond', serif;
            font-size: clamp(4rem, 8vw, 8rem);
            font-weight: 400;
            line-height: 0.85;
            color: #fff;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* ── INTRO ── */
        .section-intro {
            padding: 8rem 4rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section-intro h2 {
            font-family: 'EB Garamond', serif;
            font-size: 3.5rem;
            font-weight: 400;
            color: #fff;
        }

        /* ── COLOR SCRIPT ── */
        .color-script-container {
            padding: 2rem 4rem 10rem;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8rem;
        }

        .sequence {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .seq-header {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #444;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        [data-lb] {
            cursor: pointer;
            background: #000;
            display: block;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        [data-lb] img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-lb]:hover img { transform: scale(1.02); }

        .grid-split-stack {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2.5rem;
        }

        .stack-vertical {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .grid-split-equal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        .color-palette-bar {
            display: flex;
            height: 6px;
            margin-top: 1rem;
            width: 100%;
        }

        .color-palette-bar div { flex: 1; }

        /* Fake Palettes */
        .pal-1-1 div:nth-child(1) { background: #1a1518; } .pal-1-1 div:nth-child(2) { background: #3b2a26; } .pal-1-1 div:nth-child(3) { background: #6b4033; } .pal-1-1 div:nth-child(4) { background: #c28859; }
        .pal-1-2 div:nth-child(1) { background: #2d1810; } .pal-1-2 div:nth-child(2) { background: #5c2018; } .pal-1-2 div:nth-child(3) { background: #963222; } .pal-1-2 div:nth-child(4) { background: #e06f36; }
        .pal-1-3 div:nth-child(1) { background: #0c141d; } .pal-1-3 div:nth-child(2) { background: #20354a; } .pal-1-3 div:nth-child(3) { background: #3b5a7a; } .pal-1-3 div:nth-child(4) { background: #789cb8; }

        .pal-2-1 div:nth-child(1) { background: #18201a; } .pal-2-1 div:nth-child(2) { background: #3a4b3d; } .pal-2-1 div:nth-child(3) { background: #627b61; } .pal-2-1 div:nth-child(4) { background: #a2bca0; }
        .pal-2-2 div:nth-child(1) { background: #2a251e; } .pal-2-2 div:nth-child(2) { background: #544534; } .pal-2-2 div:nth-child(3) { background: #89745b; } .pal-2-2 div:nth-child(4) { background: #c8b598; }

        .pal-3-1 div:nth-child(1) { background: #1a0a1c; } .pal-3-1 div:nth-child(2) { background: #40103a; } .pal-3-1 div:nth-child(3) { background: #7c2069; } .pal-3-1 div:nth-child(4) { background: #d050aa; }
        .pal-3-2 div:nth-child(1) { background: #0a1820; } .pal-3-2 div:nth-child(2) { background: #143a4e; } .pal-3-2 div:nth-child(3) { background: #266b88; } .pal-3-2 div:nth-child(4) { background: #50b0d0; }

        /* ── PROJECT NAV ── */
        .project-nav {
            max-width: 1600px;
            margin: 0 auto;
            padding: 4rem;
            display: flex;
            justify-content: space-between;
        }

        .project-nav a {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .project-nav a:hover { color: #fff; }

        /* ── FOOTER ── */
        footer {
            padding: 2.25rem 4rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 0.45rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--dim);
            background: var(--bg);
        }

        /* ── SOPHISTICATED CONTACT BEACON ── */
        .side-contact {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .side-contact.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(-50%) translateX(-1rem);
        }

        .side-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(12, 12, 12, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            padding: 1.5rem 1rem 2.2rem;
            text-decoration: none;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mail-circle {
            width: 42px;
            height: 42px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: transform 0.4s ease, background 0.4s ease;
        }

        .side-btn span {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0.7;
            transition: opacity 0.4s ease;
        }

        .side-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-8px);
        }

        .side-btn:hover .mail-circle {
            background: #000;
            color: #fff;
            transform: scale(1.1);
        }

        .side-btn:hover span {
            opacity: 1;
        }

        /* ── LIGHTBOX ── */
        .lightbox { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; visibility: hidden; pointer-events: none; }
        .lightbox.active { visibility: visible; pointer-events: all; }
        .lb-backdrop { position: absolute; inset: 0; background: rgba(3,3,3,0.98); opacity: 0; transition: opacity 0.5s ease; }
        .lightbox.active .lb-backdrop { opacity: 1; }
        .lb-img-wrap { position: relative; z-index: 2; opacity: 0; transform: scale(0.97) translateY(8px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); max-width: 95vw; max-height: 90vh; display: flex; align-items: center; justify-content: center; }
        .lightbox.active .lb-img-wrap { opacity: 1; transform: scale(1) translateY(0); }
        .lb-img-wrap img { max-width: 95vw; max-height: 88vh; object-fit: contain; display: block; }
        .lb-controls { position: absolute; bottom: -3rem; left: 0; right: 0; display: flex; justify-content: center; gap: 4rem; font-family: 'Space Mono', monospace; font-size: 0.5rem; letter-spacing: 0.25em; color: #777; }
        .lb-controls span { cursor: pointer; transition: color 0.3s; }
        .lb-controls span:hover { color: #fff; }

        @media (max-width: 1024px) {
            .side-contact { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-back">&#8592; Back</a>
    <div class="nav-logo">Andrés Merino</div>
</nav>

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <div class="lb-backdrop" id="lb-backdrop"></div>
    <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="">
        <div class="lb-controls">
            <span id="lb-prev">PREV</span>
            <span id="lb-next">NEXT</span>
            <span id="lb-close">CLOSE</span>
        </div>
    </div>
</div>

<script>
    const nav = document.querySelector('nav');
    const sideContact = document.getElementById('side-contact');

    window.addEventListener('scroll', () => {
        if (window.scrollY > 200) {
            sideContact.classList.add('visible');
        } else {
            sideContact.classList.remove('visible');
        }
    });

    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const triggers = Array.from(document.querySelectorAll('[data-lb]'));
    const imgList = triggers.map(el => {
        const img = el.querySelector('img');
        return { src: img.src, alt: img.alt };
    });

    let current = 0;
    function openLb(i) {
        current = i;
        lbImg.src = imgList[i].src;
        lbImg.style.opacity = '1';
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeLb() {
        lb.classList.remove('active');
        document.body.style.overflow = '';
    }
    function go(dir) {
        current = (current + dir + imgList.length) % imgList.length;
        lbImg.style.opacity = '0';
        setTimeout(() => {
            lbImg.src = imgList[current].src;
            lbImg.style.opacity = '1';
        }, 200);
    }

    triggers.forEach((el, i) => el.addEventListener('click', () => openLb(i)));
    document.getElementById('lb-close').addEventListener('click', closeLb);
    document.getElementById('lb-backdrop').addEventListener('click', closeLb);
    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); go(-1); });
    document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); go(1); });

    document.addEventListener('keydown', e => {
        if (!lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLb();
        if (e.key === 'ArrowLeft') go(-1);
        if (e.key === 'ArrowRight') go(1);
    });
</script>
