    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #030303; --border: rgba(255,255,255,0.07); --text: #e0e0e0; --muted: #555; --gap: 2rem; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 100px 100px; background-attachment: fixed; }
        nav { padding: 1.75rem 3rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 500; background: rgba(3,3,3,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }

        .hero { width: 100%; height: 90vh; position: relative; overflow: hidden; cursor: pointer; border-bottom: 1px solid var(--border); }
        .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; animation: heroIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .hero:hover img { transform: scale(1.015); }
        @keyframes heroIn { from { transform: scale(1.03); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(3,3,3,0.95) 0%, transparent 60%); pointer-events: none; }
        .hero-text { position: absolute; bottom: 4rem; left: 4rem; z-index: 2; pointer-events: none; }

        .gallery { padding: 6rem 4rem 12rem; display: flex; flex-direction: column; gap: 10rem; max-width: 1600px; margin: 0 auto; }
        .tile-wrap { display: flex; flex-direction: column; width: 100%; position: relative; }

        .lb { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; visibility: hidden; pointer-events: none; }
        .lb.on { visibility: visible; pointer-events: all; }
        .lb-bg { position: absolute; inset: 0; background: rgba(3,3,3,0.98); opacity: 0; transition: opacity 0.5s ease; }
        .lb.on .lb-bg { opacity: 1; }
        .lb-content { position: relative; z-index: 2; opacity: 0; transform: scale(0.97) translateY(8px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); max-width: 95vw; max-height: 90vh; display: flex; align-items: center; justify-content: center; }
        .lb.on .lb-content { opacity: 1; transform: scale(1) translateY(0); }
        .lb-content img, .lb-content video { max-width: 95vw; max-height: 88vh; object-fit: contain; display: block; }
        .lb-meta { position: absolute; top: -2.5rem; left: 0; font-family: 'Space Mono', monospace; font-size: 0.45rem; color: #777; letter-spacing: 0.12em; text-transform: uppercase; }

        .lb-nav span { cursor: pointer; transition: color 0.3s; }
        .lb-nav span:hover { color: #fff; }
        @media (max-width: 1024px) { .side-contact { display: none; } }

<script>
    const nav = document.getElementById('main-nav'); const sideContact = document.getElementById('side-contact');
    window.addEventListener('scroll', () => { if (window.scrollY > 200) { sideContact.classList.add('visible'); } else { sideContact.classList.remove('visible'); } });
    const lb = document.getElementById('lb'); const lbImg = document.getElementById('lb-img'); const lbCon = document.getElementById('lb-content'); const lbMeta = document.getElementById('lb-meta');
    const tiles = Array.from(document.querySelectorAll('.tile')); const items = tiles.map(t => ({ type: t.dataset.media, src: t.dataset.src }));
    let current = 0; let lbMedia = null;
    function openLb(i) { current = i; showItem(); lb.classList.add('on'); document.body.style.overflow = 'hidden'; }
    function showItem() { if (lbMedia) lbMedia.remove(); const item = items[current]; lbMeta.textContent = item.src.split('/').pop();
        if (item.type === 'video') { lbMedia = document.createElement('video'); lbMedia.autoplay = true; lbMedia.loop = true; lbMedia.muted = true; lbMedia.playsInline = true; lbMedia.controls = true; const src = document.createElement('source'); src.src = item.src; src.type = 'video/mp4'; lbMedia.appendChild(src); }
        else { lbMedia = document.createElement('img'); lbMedia.src = item.src; }
        lbCon.insertBefore(lbMedia, document.querySelector('.lb-nav')); }
    function closeLb() { lb.classList.remove('on'); document.body.style.overflow = ''; setTimeout(() => { if (lbMedia) { lbMedia.remove(); lbMedia = null; } }, 500); }
    function go(dir) { current = (current + dir + items.length) % items.length; showItem(); }
    tiles.forEach((t, i) => t.addEventListener('click', () => openLb(i)));
    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); go(-1); }); document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); go(1); }); document.getElementById('lb-close').addEventListener('click', e => { e.stopPropagation(); closeLb(); }); document.getElementById('lb-bg').addEventListener('click', closeLb);
    document.addEventListener('keydown', e => { if (!lb.classList.contains('on')) return; if (e.key === 'Escape') closeLb(); if (e.key === 'ArrowLeft') go(-1); if (e.key === 'ArrowRight') go(1); });
</script>
