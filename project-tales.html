<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales From Outer Suburbia — Andrés Merino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:     #0c0c0c;
            --border: #1e1e1e;
            --text:   #d0d0d0;
            --muted:  #505050;
            --dim:    #3e3e3e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(12,12,12,0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid transparent;
            transition: border-color 0.4s;
        }

        nav.scrolled { border-color: var(--border); }

        .nav-back {
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-back:hover { color: var(--text); }

        .nav-logo {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }

        /* ── HERO ── */
        .hero {
            width: 100%;
            height: 90vh;
            overflow: hidden;
            position: relative;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            animation: heroReveal 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .hero:hover img { transform: scale(1.025); }

        @keyframes heroReveal {
            from { transform: scale(1.06); opacity: 0.5; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(12,12,12,0.7) 100%);
        }

        .hero-title-wrap {
            position: absolute;
            bottom: 3rem;
            left: 4rem;
            z-index: 2;
        }

        .hero-title {
            font-family: 'EB Garamond', serif;
            font-size: clamp(2.8rem, 6vw, 5.5rem);
            font-weight: 400;
            line-height: 0.9;
            color: #fff;
        }

        /* ── PROJECT INFO ── */
        .project-info-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-bottom: 1px solid var(--border);
        }

        .info-cell { padding: 2rem 3rem; border-right: 1px solid var(--border); text-align: center; }
        .info-cell:last-child { border-right: none; }
        .info-value { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text); }

        /* ── CONTENT ── */
        .content { padding: 0 4rem 8rem; }

        .section-label {
            padding: 3.5rem 0 1.5rem;
            display: flex; align-items: center; gap: 1.5rem;
        }

        .section-label span { font-size: 0.48rem; letter-spacing: 0.32em; text-transform: uppercase; color: #3e3e3e; white-space: nowrap; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .caption { padding: 1rem 0.2rem 0; font-size: 0.48rem; letter-spacing: 0.18em; text-transform: uppercase; color: #3e3e3e; font-weight: 300; line-height: 2.2; }

        [data-lb] { cursor: pointer; display: block; overflow: hidden; }
        [data-lb] img { width: 100%; display: block; transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        [data-lb]:hover img { transform: scale(1.025); }

        .block-full { margin-bottom: 3px; }

        .block-main-aside {
            display: grid; grid-template-columns: 2fr 1fr; gap: 3px; margin-bottom: 3px; align-items: end;
        }

        /* ── SOPHISTICATED CONTACT BEACON ── */
        .side-contact {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .side-contact.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(-50%) translateX(-1rem);
        }

        .side-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(12, 12, 12, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            padding: 1.5rem 1rem 2.2rem;
            text-decoration: none;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mail-circle {
            width: 42px;
            height: 42px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: transform 0.4s ease, background 0.4s ease;
        }

        .side-btn span {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0.7;
            transition: opacity 0.4s ease;
        }

        .side-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-8px);
        }

        .side-btn:hover .mail-circle {
            background: #000;
            color: #fff;
            transform: scale(1.1);
        }

        .side-btn:hover span {
            opacity: 1;
        }

        /* ── FOOTER ── */
        .project-nav { margin-top: 6rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
        .project-nav a { font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
        .project-nav a:hover { color: var(--text); }

        footer { padding: 1.75rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
        footer span { font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }

        /* ── LIGHTBOX ── */
        .lightbox { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; visibility: hidden; pointer-events: none; }
        .lightbox.active { visibility: visible; pointer-events: all; }
        .lb-backdrop { position: absolute; inset: 0; background: rgba(10,10,10,0.85); backdrop-filter: blur(26px); transition: opacity 0.6s ease; }
        .lb-img-wrap { position: relative; z-index: 2; opacity: 0; transform: scale(0.91) translateY(16px); transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .lightbox.active .lb-img-wrap { opacity: 1; transform: scale(1) translateY(0); }
        .lb-img-wrap img { display: block; max-width: 90vw; max-height: 88vh; object-fit: contain; }
        .lb-close { position: absolute; top: -2.25rem; right: 0; font-size: 0.48rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(208,208,208,0.4); cursor: pointer; background: none; border: none; transition: color 0.3s; }
        .lb-counter { position: absolute; bottom: -1.8rem; left: 50%; transform: translateX(-50%); font-size: 0.42rem; letter-spacing: 0.3em; color: rgba(208,208,208,0.25); white-space: nowrap; }
        .lb-arrow { position: fixed; top: 50%; transform: translateY(-50%); z-index: 3; background: none; border: none; color: rgba(208,208,208,0.25); font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; padding: 1.5rem; transition: color 0.3s; }
        .lb-arrow:hover { color: var(--text); }
        .lb-arrow.prev { left: 1.5rem; }
        .lb-arrow.next { right: 1.5rem; }

        @media (max-width: 900px) {
            nav, .content { padding-left: 1.5rem; padding-right: 1.5rem; }
            .hero-title-wrap { left: 1.5rem; bottom: 2rem; }
            .block-main-aside { grid-template-columns: 1fr; }
            .side-contact { display: none; }
        }
    </style>
</head>
<body>

<nav id="main-nav">
    <a href="index.html" class="nav-back">&#8592; &nbsp; All Work</a>
    <a href="index.html" class="nav-logo">Andrés Merino</a>
</nav>

<!-- Hero -->
<div class="hero" data-lb style="cursor:pointer;">
    <img src="assets/img/projects/Tales From Outer suburbia/grandparentsForestA0003_bg_pnt_v004+copy.webp" alt="Tales From Outer Suburbia">
    <div class="hero-title-wrap">
        <h1 class="hero-title">Tales From<br>Outer Suburbia</h1>
    </div>
</div>

<div class="project-info-bar">
    <div class="info-cell"><p class="info-value">Background Painting</p></div>
    <div class="info-cell"><p class="info-value">Environment Design</p></div>
    <div class="info-cell"><p class="info-value">Visual Development</p></div>

<div class="content">
    <div class="section-label"><span>Environments</span></div>
    <div class="block-full"><div data-lb><img src="assets/img/projects/Tales From Outer suburbia/grandparentsForestA0004_bg_pnt_v004+copy.webp" alt="Forest"></div></div>
    <p class="caption">Master</p>

    <div class="section-label"><span>Atmosphere Studies</span></div>
    <div class="block-full"><div data-lb><img src="assets/img/projects/Tales From Outer suburbia/sunset+golden+skydome+tests.webp" alt="Sunset"></div></div>

    <div class="block-main-aside" style="margin-top: 3px;">
        <div data-lb><img src="assets/img/projects/Tales From Outer suburbia/Storms+test.webp" alt="Storm"></div>
        <div data-lb style="margin-top: 5rem;"><img src="assets/img/projects/Tales From Outer suburbia/storms3.webp" alt="Panels"></div>
    </div>

    <div class="project-nav">

<!-- Contact Beacon -->
<div class="side-contact" id="side-contact">
    <a href="mailto:andresgonzalezmerino@gmail.com" class="side-btn">
        <div class="mail-circle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <div class="lb-backdrop" id="lb-backdrop"></div>
    <button class="lb-arrow prev" id="lb-prev">&#8592;</button>
    <div class="lb-img-wrap">
        <button class="lb-close" id="lb-close">CLOSE &#215;</button>
        <img id="lb-img" src="" alt="">
        <div class="lb-counter" id="lb-counter"></div>
    </div>
    <button class="lb-arrow next" id="lb-next">&#8594;</button>
</div>

<script>
    const nav = document.getElementById('main-nav');
    const sideContact = document.getElementById('side-contact');

    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 10);
        if (window.scrollY > 150) {
            sideContact.classList.add('visible');
        } else {
            sideContact.classList.remove('visible');
        }
    });

    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    const triggers = Array.from(document.querySelectorAll('[data-lb]'));
    const imgList  = triggers.map(el => {
        const img = el.querySelector('img') || el;
        return { src: img.src, alt: img.alt };
    });

    let current = 0;
    function openLightbox(i) {
        current = i;
        lbImg.src = imgList[i].src;
        lbImg.style.opacity = '1';
        lbCounter.textContent = (i + 1) + ' / ' + imgList.length;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }
    function go(dir) {
        current = (current + dir + imgList.length) % imgList.length;
        lbImg.style.opacity = '0';
        setTimeout(() => {
            lbImg.src = imgList[current].src;
            lbCounter.textContent = (current + 1) + ' / ' + imgList.length;
            lbImg.style.opacity = '1';
        }, 200);
    }

    triggers.forEach((el, i) => el.addEventListener('click', () => openLightbox(i)));
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-backdrop').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); go(-1); });
    document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); go(1); });

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') go(-1);
        if (e.key === 'ArrowRight') go(1);
    });
</script>

</body>
