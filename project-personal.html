<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Work — Andrés Merino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #050505; --surface: #0a0a0a; --border: rgba(255,255,255,0.06); --text: #e0e0e0; --muted: #555; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        nav { padding: 2rem 4rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        .nav-back, .nav-logo { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
        .nav-back:hover { color: #fff; }
        .nav-logo { font-weight: 700; color: #fff; }
        .hero { width: 100%; height: 80vh; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); cursor: pointer; }
        .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .hero-title-wrap { position: absolute; bottom: 4rem; left: 4rem; z-index: 2; }
        .hero-title { font-family: 'EB Garamond', serif; font-size: 5rem; font-weight: 400; color: #fff; line-height: 0.9; }
        .section-intro { padding: 8rem 4rem 2rem; max-width: 1600px; margin: 0 auto; }
        .section-intro h2 { font-family: 'EB Garamond', serif; font-size: 3rem; font-weight: 400; color: #fff; }
        .room-illustration { padding: 2rem 4rem 10rem; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 4rem; }
        .arch-block { position: relative; width: 100%; }
        [data-lb] { cursor: pointer; background: #000; display: block; overflow: hidden; border: 1px solid var(--border); }
        [data-lb] img { width: 100%; display: block; transition: transform 0.8s ease; }
        [data-lb]:hover img { transform: scale(1.02); }
        .arch-label { font-size: 0.45rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 1rem; }
        .room-technical { background: var(--surface); padding: 8rem 4rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .grid-technical { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; max-width: 1600px; margin: 0 auto; }
        .tech-card .label { font-size: 0.45rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 1rem; }
        .room-sketches { padding: 8rem 4rem; max-width: 1600px; margin: 0 auto; }
        .collage-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .project-nav { padding: 4rem; display: flex; justify-content: space-between; border-top: 1px solid var(--border); }
        .project-nav a { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
        footer { padding: 2rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.45rem; letter-spacing: 0.2em; text-transform: uppercase; color: #333; }
        .lightbox { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; visibility: hidden; }
        .lightbox.active { visibility: visible; }
        .lb-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.95); }
        .lb-img-wrap img { max-width: 90vw; max-height: 85vh; position: relative; z-index: 2; }
    </style>
</head>
<body>
<nav><a href="index.html" class="nav-back">&#8592; Back</a><div class="nav-logo">AM</div></nav>
<div class="hero" data-lb><img src="assets/img/projects/Personal Work/Illustration/ultima+version.webp" alt="Hero"><div class="hero-title-wrap"><h1 class="hero-title">Personal<br>Works</h1></div></div>
<div class="section-intro"><h2>Environment Design</h2></div>
<div class="room-illustration">
    <div class="arch-block"><div data-lb><img src="assets/img/projects/Personal Work/Illustration/plein+airpril+8+COPIA.webp" alt="Scale"></div><div class="arch-label">Atmospheric Scale</div></div>
    <div class="arch-block"><div data-lb><img src="assets/img/projects/Personal Work/Illustration/boskexperimento+jpeg.webp" alt="Forest"></div><div class="arch-label">Forest Study</div></div>
</div>
<div class="section-intro"><h2>Technical & Sketches</h2></div>
<div class="room-technical">
    <div class="grid-technical">
        <div class="tech-card"><div data-lb><img src="assets/img/projects/Personal Work/Other/KAS.webp" alt="KAS"></div><div class="label">KAS / Rendering</div></div>
        <div class="tech-card"><div data-lb><img src="assets/img/projects/Personal Work/Other/punkikas.webp" alt="Punk"></div><div class="label">Punk / Line</div></div>
    </div>
</div>
<div class="room-sketches">
    <div class="collage-wrapper">
        <div data-lb><img src="assets/img/projects/Personal Work/Other/imagen_2025-05-28_211140209.webp" alt="Sketch"></div>
        <div data-lb><img src="assets/img/projects/Personal Work/Other/imagen_2025-05-28_211217089.webp" alt="Sketch"></div>
        <div data-lb><img src="assets/img/projects/Personal Work/Other/imagen_2025-05-28_211242668.webp" alt="Sketch"></div>
    </div>
</div>
<div class="project-nav"><a href="index.html">&#8592; Back</a><a href="project-kayara.html">Next &#8594;</a></div>
<footer><span>&copy; 2026 Andrés Merino</span></footer>
<div class="lightbox" id="lightbox"><div class="lb-backdrop" id="lb-backdrop"></div><div class="lb-img-wrap"><img id="lb-img" src=""></div></div>
<script>
    const lb = document.getElementById('lightbox'); const lbImg = document.getElementById('lb-img');
    document.querySelectorAll('[data-lb]').forEach(el => el.onclick = () => { lbImg.src = el.querySelector('img').src; lb.classList.add('active'); });
    document.getElementById('lb-backdrop').onclick = () => lb.classList.remove('active');
</script>
</body>
</html>
